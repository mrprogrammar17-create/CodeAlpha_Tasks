<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Modern Gallery</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>✨ Modern Image Gallery</h1>
  <p>HTML • CSS • JavaScript</p>
</header>

<!-- FILTER BUTTONS -->
<div class="filters">
  <button onclick="filterImages('all')">All</button>
  <button onclick="filterImages('nature')">Nature</button>
  <button onclick="filterImages('city')">City</button>
</div>

<!-- GALLERY -->
<div class="gallery">

  <img src="https://images.unsplash.com/photo-1501785888041-af3ef285b470" class="nature reveal" onclick="openLightbox(0)">
  <img src="https://images.unsplash.com/photo-1441974231531-c6227db76b6e" class="nature reveal" onclick="openLightbox(1)">
  <img src="https://images.unsplash.com/photo-1469474968028-56623f02e42e" class="nature reveal" onclick="openLightbox(2)">

  <img src="https://images.unsplash.com/photo-1493246507139-91e8fad9978e" class="city reveal" onclick="openLightbox(3)">
  <img src="https://images.unsplash.com/photo-1477959858617-67f85cf4f1df" class="city reveal" onclick="openLightbox(4)">
  <img src="https://images.unsplash.com/photo-1508051123996-69f8caf4891d" class="city reveal" onclick="openLightbox(5)">

</div>

<!-- LIGHTBOX -->
<div id="lightbox">
  <span onclick="closeLightbox()">✕</span>
  <img id="lightbox-img">
</div>

<script src="script.js"></script>
</body>
</html>
